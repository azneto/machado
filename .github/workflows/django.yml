name: Machado CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:

    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
          POSTGRES_DB: yourdatabase
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Lint with flake8
      run: |
        pip install flake8 flake8-black flake8-pyproject
        flake8 machado
    - name: Verify machado-startproject
      run: |
        mkdir -p /tmp/testproject
        machado-startproject /tmp/testproject
        sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgres://username:password@localhost:5432/yourdatabase|' /tmp/testproject/.env
        python /tmp/testproject/manage.py check
    - name: Run Tests
      run: |
        python -m django test machado --settings machado.tests.settings
